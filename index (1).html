<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scoreboard Help — Electro-Mech Line-Score CX-402</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f3;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 16px;
  }

  #wrap {
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 480px;
    min-height: calc(100dvh - 32px);
    border: 0.5px solid #d0cfc8;
    border-radius: 12px;
    overflow: hidden;
    background: #ffffff;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  #header {
    padding: 12px 16px;
    border-bottom: 0.5px solid #d0cfc8;
    background: #f5f5f3;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #header-icon {
    width: 28px; height: 28px; border-radius: 8px;
    background: #e6f1fb; display: flex;
    align-items: center; justify-content: center; flex-shrink: 0;
  }

  #header-text { font-size: 14px; font-weight: 500; color: #1a1a18; }
  #header-sub { font-size: 11px; color: #6b6b63; margin-top: 1px; }

  #messages {
    flex: 1; overflow-y: auto;
    padding: 16px; display: flex;
    flex-direction: column; gap: 10px; min-height: 120px;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: #d0cfc8; border-radius: 2px; }

  .msg-row { display: flex; gap: 8px; align-items: flex-start; animation: fadeUp 0.2s ease; }
  .msg-row.user { flex-direction: row-reverse; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .av {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; flex-shrink: 0; margin-top: 2px;
  }
  .av.bot { background: #e6f1fb; color: #185fa5; }
  .av.usr { background: #f5f5f3; color: #6b6b63; border: 0.5px solid #d0cfc8; }

  .bubble {
    max-width: 82%; padding: 9px 13px;
    border-radius: 12px; font-size: 14px; line-height: 1.55;
  }
  .bubble.bot {
    background: #f5f5f3; border: 0.5px solid #d0cfc8;
    color: #1a1a18; border-top-left-radius: 4px;
  }
  .bubble.usr {
    background: #e6f1fb; color: #185fa5;
    border-top-right-radius: 4px;
  }
  .bubble kbd {
    display: inline-block;
    background: #faeeda; color: #854f0b;
    font-family: monospace; font-size: 11px; font-weight: 600;
    padding: 1px 5px; border-radius: 4px; white-space: nowrap;
  }
  .bubble ol { padding-left: 16px; margin-top: 4px; display: flex; flex-direction: column; gap: 3px; }
  .bubble strong { font-weight: 600; }

  .dot-typing { display: flex; gap: 4px; align-items: center; padding: 4px 2px; }
  .dot-typing span { width: 6px; height: 6px; border-radius: 50%; background: #888780; animation: dta 1.2s infinite; }
  .dot-typing span:nth-child(2) { animation-delay: 0.2s; }
  .dot-typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dta { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-5px);opacity:1} }

  #quick-area {
    padding: 12px 16px;
    border-top: 0.5px solid #d0cfc8;
    background: #f5f5f3;
  }
  #quick-label { font-size: 11px; color: #6b6b63; margin-bottom: 8px; }
  #quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

  .qbtn {
    background: #ffffff; border: 0.5px solid #d0cfc8;
    border-radius: 8px; padding: 8px 10px;
    font-size: 12px; color: #1a1a18; cursor: pointer;
    text-align: left; line-height: 1.35;
    transition: all 0.15s; font-family: inherit;
  }
  .qbtn:hover { background: #f5f5f3; border-color: #b4b2a9; }
  .qbtn:active { transform: scale(0.98); }

  #input-area {
    padding: 10px 16px 14px; background: #ffffff;
    border-top: 0.5px solid #d0cfc8;
    display: flex; gap: 8px; align-items: flex-end;
  }

  #msg-input {
    flex: 1; border: 0.5px solid #d0cfc8; border-radius: 8px;
    padding: 9px 12px; font-size: 14px; font-family: inherit;
    color: #1a1a18; background: #f5f5f3;
    resize: none; min-height: 38px; max-height: 90px;
    outline: none; line-height: 1.4;
  }
  #msg-input:focus { border-color: #888780; }
  #msg-input::placeholder { color: #888780; }

  #send-btn {
    width: 38px; height: 38px; border-radius: 8px;
    border: 0.5px solid #b4b2a9; background: #ffffff;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; color: #1a1a18; flex-shrink: 0;
    transition: background 0.15s;
  }
  #send-btn:hover { background: #f5f5f3; }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .err-bubble {
    background: #fcebeb; color: #a32d2d;
    border-radius: 8px; padding: 8px 12px;
    font-size: 13px; border: 0.5px solid #f09595;
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="header">
    <div id="header-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#185fa5" stroke-width="1.5" stroke-linecap="round">
        <rect x="2" y="6" width="20" height="12" rx="2"/>
        <path d="M7 10h4M13 10h4M7 14h2M11 14h2M15 14h2"/>
      </svg>
    </div>
    <div>
      <div id="header-text">Scoreboard Help</div>
      <div id="header-sub">Electro-Mech CX-402 · Line-Score Baseball (LINESCORE5)</div>
    </div>
  </div>

  <div id="messages"></div>

  <div id="quick-area">
    <div id="quick-label">Quick questions</div>
    <div id="quick-grid">
      <button class="qbtn" onclick="askQ('How do I reset the scoreboard for a new game?')">New game reset</button>
      <button class="qbtn" onclick="askQ('How do I set the game clock to a specific time?')">Set the clock</button>
      <button class="qbtn" onclick="askQ('How do I add runs for the team currently at bat?')">Add runs</button>
      <button class="qbtn" onclick="askQ('How do I correct runs logged for a specific inning using SET RUNS / INNING?')">Fix inning runs</button>
      <button class="qbtn" onclick="askQ('How do I set or correct the total runs directly?')">Fix total runs</button>
      <button class="qbtn" onclick="askQ('How do I advance to the next half-inning or change the inning?')">Change half-inning</button>
      <button class="qbtn" onclick="askQ('How do I jump directly to a specific inning?')">Jump to inning</button>
      <button class="qbtn" onclick="askQ('How do I track hits and errors?')">Hits &amp; errors</button>
      <button class="qbtn" onclick="askQ('How do I update ball, strike, and out counts?')">Ball / Strike / Out</button>
      <button class="qbtn" onclick="askQ('How do I use the pitch count feature?')">Pitch count</button>
      <button class="qbtn" onclick="askQ('How do I set electronic team names on the scoreboard?')">Set team names</button>
      <button class="qbtn" onclick="askQ('How do I run a lamp test or blank test?')">Lamp / blank test</button>
    </div>
  </div>

  <div id="input-area">
    <textarea id="msg-input" placeholder="Type your question and press Enter…" rows="1"></textarea>
    <button id="send-btn" onclick="sendMsg()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
// ---------------------------------------------------------------
// IMPORTANT: Replace this with your NAS address and port
// Example: 'http://192.168.1.100:3001/chat'  (local network only)
// Example: 'http://yourname.quickconnect.to:3001/chat' (external)
// ---------------------------------------------------------------
const PROXY_URL = 'https://scoreboard-proxy.ensman.workers.dev';

const SYSTEM = `You are a quick-help assistant for the Electro-Mech CX-402 Line-Score Baseball control console (LINESCORE5, software version 4.0.2). Answer ONLY questions about operating this specific console. If asked something unrelated, say you can only help with this console.

KEY OPERATIONS:
- [RUNS +1] — adds 1 run to the team currently at bat; also updates the Runs-By-Inning display for the current inning
- [HITS +1] — adds 1 hit to team currently at bat; flashes Hit indicator 4 times
- [ERRORS +1] — adds 1 error to team NOT currently at bat; flashes Error indicator 4 times
- [BALL +1] — adds 1 to Ball count
- [STRIKE +1] — adds 1 to Strike count
- [OUT +1] — adds 1 to Out count
- [HORN] — sounds horn 2 seconds
- [CLOCK ON / OFF] — starts/stops game clock
- [CLEAR / FLASH HIT] — flashes Hit indicator; also cancels/exits input entry
- [ENTER / FLASH ERROR] — flashes Error indicator; also confirms input

INNING CONTROL:
- [INC. INNING TOP / BOT] — advances to next half-inning. First press = Top 1st, second = Bottom 1st, third = Top 2nd, etc.
- [SET INNING TOP / BOT] — jump directly to any inning. Prompts: SET INNING <xx> (enter number, ENTER), then 1=BOT 0=TOP

SCORE / RUNS CORRECTION:
- [SET TOTAL RUNS] — directly set total runs. Prompts TOT RUNS TOP<00> then TOT RUNS BOT<00>. Press ENTER to skip one.
- [SET RUNS / INNING] — edit per-inning run display. Prompts: EDIT INNING <xx>, SET RUNS TOP <x>, SET RUNS BOT <x>

HITS / ERRORS CORRECTION:
- [SET TOTAL HITS] — directly set total hits. Prompts TOT HITS TOP<00> then TOT HITS BOT<00>
- [SET TOTAL ERRORS] — directly set total errors. Prompts TOT ERRS TOP<00> then TOT ERRS BOT<00>
- [ASSIGN ERROR] — assign error to specific fielder. Prompt: ERR POSITION <0>
  Positions: 1=Pitcher 2=Catcher 3=1st Base 4=2nd Base 5=3rd Base 6=Short Stop 7=Left Field 8=Center Field 9=Right Field

PITCH COUNT:
- [PITCHES +1] — increments pitch count for team NOT currently at bat
- [SET PITCH COUNTS] — directly set pitch counts. Prompts: TOP PITCHES<000> then BOT PITCHES<000>

BATTER NUMBER:
- [SET BATTER] — set current batter number. Prompt: BATTER NUM <00>

CLOCK (only when clock is NOT running):
- [SET CLOCK] digits [ENTER] — e.g. [SET CLOCK][5][3][0][ENTER] = 5:30
- [CLOCK UP / DOWN][1][ENTER] = count up; [0][ENTER] = count down
- [.1 SEC ON / OFF] — toggles tenth-of-second display in final minute
- [AUTO HORN] — toggles auto horn at period end (1=auto, 0=off)
- [TIME OF DAY] — use clock to show time of day. Exit with [TIME OF DAY][0][ENTER]

NEW GAME functions (clock must be stopped):
- [NEW GAME][1][ENTER] = reset all data
- [NEW GAME][2] = set brightness 50-100%
- [NEW GAME][4] = Blank Test (all off; [NEW GAME] to exit)
- [NEW GAME][5] = Lamp Test (all on; [NEW GAME] to exit)
- [NEW GAME][7] = set Electronic Team Names
- [NEW GAME][8] = Precision Time Mode toggle

ETN ENTRY (phone-style keypad):
[7][7]=B, [8][8]=E, [7]=A, [6][6][6]=R, [1]=S
[CLEAR] backs up; [ENTER] confirms. Font: 1=Condensed 2=Regular 3=Bold. Justify: 1=Left 2=Center 3=Right

POWER: No power button. Plugged in = on. Unplug both cables when not in use.

ANSWER FORMAT:
- Be very brief and action-oriented
- Number steps for procedures
- Always write button names in [BRACKETS]
- If not in the manual say: "That's not covered — call Electro-Mech at 800-445-7846"`;

const msgsEl = document.getElementById('messages');
const inputEl = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
let history = [];
let busy = false;

function addMsg(role, text, typing) {
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  const av = document.createElement('div');
  av.className = 'av ' + (role === 'assistant' ? 'bot' : 'usr');
  av.textContent = role === 'assistant' ? 'EM' : 'You';
  const bub = document.createElement('div');
  bub.className = 'bubble ' + (role === 'assistant' ? 'bot' : 'usr');
  if (typing) {
    bub.innerHTML = '<div class="dot-typing"><span></span><span></span><span></span></div>';
    row.id = 'typing-row';
  } else {
    bub.innerHTML = fmt(text);
  }
  row.appendChild(av);
  row.appendChild(bub);
  msgsEl.appendChild(row);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return row;
}

function fmt(t) {
  t = t.replace(/\[([^\]]+)\]/g, '<kbd>$1</kbd>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  const lines = t.split('\n');
  let html = '', inOl = false;
  for (const line of lines) {
    const m = line.match(/^(\d+)[.)]\s+(.+)/);
    if (m) {
      if (!inOl) { html += '<ol>'; inOl = true; }
      html += '<li>' + m[2] + '</li>';
    } else {
      if (inOl) { html += '</ol>'; inOl = false; }
      html += (line.trim() === '' ? '<br>' : line + '<br>');
    }
  }
  if (inOl) html += '</ol>';
  return html;
}

function askQ(q) {
  if (busy) return;
  inputEl.value = q;
  sendMsg();
}

async function sendMsg() {
  const text = inputEl.value.trim();
  if (!text || busy) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  busy = true;
  sendBtn.disabled = true;

  addMsg('user', text);
  history.push({ role: 'user', content: text });
  const typingRow = addMsg('assistant', '', true);

  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: history
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'API error');
    const reply = data.content.map(b => b.text || '').join('');
    history.push({ role: 'assistant', content: reply });
    typingRow.remove();
    addMsg('assistant', reply);
  } catch (e) {
    typingRow.remove();
    const row = document.createElement('div');
    row.className = 'msg-row assistant';
    row.innerHTML = '<div class="av bot">EM</div><div class="err-bubble">Could not reach the server — make sure your NAS proxy is running.</div>';
    msgsEl.appendChild(row);
    history.pop();
  }

  busy = false;
  sendBtn.disabled = false;
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

inputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 90) + 'px';
});
inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

addMsg('assistant', 'Ready to help! Ask me anything about your Electro-Mech CX-402 Line-Score console — runs, innings, hits, errors, clock, team names, and more. Or tap a quick question below.');
</script>
</body>
</html>
